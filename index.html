<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Attendance Generator</title>
    <link rel="icon" type="image/png" href="icon-192.png">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4CAF50">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Attendance">
</head>
<body onload="onPageLoad()">
    <button id="settingsButton" class="simpleButton" onclick="openSettingsPanel()">&#9881;</button>
    <div class="center" style="width: 500px; padding: 30px;">
        <div id="settingsDiv">
            <button id="closeSettingsButton" class="simpleButton" onclick="closeSettingsPanel()">&#x2715</button>
            <input id="nameInput" class="textarea" rows="1" placeholder="Name" oninput="onChangeName();generateAttendanceText()" onfocusout="emphasizeIfEmptyName()" onfocusin="clearSettingsButtonAnimation()"></input>
            <div class="settingsActionRow">
                <button id="openScheduleJsonButton" class="settingsActionButton" onclick="openScheduleJsonInput()">Edit Schedules JSON</button>
                <button id="openLocationJsonButton" class="settingsActionButton" onclick="openLocationJsonInput()">Edit Nearby Places JSON</button>
            </div>
            <textarea id="scheduleJsonInput" class="textarea" placeholder="Schedules JSON" oninput="onChangeScheduleInput();generateAttendanceText()" style="display: none;"></textarea>
            <textarea id="locationJsonInput" class="textarea" placeholder='Nearby Places JSON&#10;[&#10;  {&#10;    "place": "MCGI Addas",&#10;    "template": "MCGI Addas",&#10;    "latitude": 14.5995,&#10;    "longitude": 120.9842,&#10;    "radiusMeters": 150&#10;  }&#10;]' oninput="onChangeLocationInput();generateAttendanceText()" style="display: none;"></textarea>
        </div>
        <div id="attendanceDiv">
            <textarea id="attendanceText" class="textarea" spellcheck=”false” autocomplete="off"></textarea>
            <strong id="statusText"></strong>
            <button id="refreshButton" onclick="generateAttendanceText()" onmousedown="clearAttendanceText();clearStatusText()" class="simpleButton">&#x21bb;</button>
        </div>
        <button onclick="copyTextToClipboard()" onmousedown="clearStatusText()" style="margin-top: 15px; width: 500px;" class="button">Copy Attendance</button>
    </div>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js');
            });
        }
    </script>
</body>
</html>

<script type="text/javascript">
    const KEY_NAME = "KEY_NAME"
    const KEY_SCHEDULES_JSON = "KEY_SCHEDULES_JSON"
    const KEY_LOCATIONS_JSON = "KEY_LOCATIONS_JSON"
    const DEFAULT_LOCATION_RADIUS_METERS = 150
    const LOCATION_LOOKUP_MAX_AGE_MS = 5 * 60 * 1000

    class ScheduleJsonParsingError {
        constructor(message) {
            this.message = message
        }
    }

    class LocationJsonParsingError {
        constructor(message) {
            this.message = message
        }
    }

    var lastKnownCoordinates = null
    var lastKnownCoordinatesAt = 0
    var currentLocationLookupPromise = null

    function getGatheringSchedules() {
        try {
            if (getScheduleJsonInputElement().value.trim() === "") {
                return ""
            } else {
                return JSON.parse(getScheduleJsonInputElement().value)
            }
        } catch (e) {
            throw new ScheduleJsonParsingError("Invalid Schedule JSON")
        }
        return ""
    }

    function getLocationAssociations() {
        try {
            if (getLocationJsonInputElement().value.trim() === "") {
                return []
            }

            var locationAssociations = JSON.parse(getLocationJsonInputElement().value)

            if (!Array.isArray(locationAssociations)) {
                throw new LocationJsonParsingError("Nearby Places JSON should be a list")
            }

            return locationAssociations
        } catch (e) {
            if (e instanceof LocationJsonParsingError) {
                throw e
            }
            throw new LocationJsonParsingError("Invalid Nearby Places JSON")
        }
    }

    function onPageLoad() {
        loadSavedValues()
        emphasizeIfEmptyName()
        generateAttendanceText()
    }

    function emphasizeIfEmptyName() {
        if (getNameInputElement().value.trim() === "") {
            document.getElementById("settingsButton").style.animation = "glowing 1300ms infinite"
        } else {
            clearSettingsButtonAnimation()
        }
    }

    function clearSettingsButtonAnimation() {
        document.getElementById("settingsButton").style.animation = ""
    }

    function loadSavedValues() {
        getNameInputElement().value = localStorage.getItem(KEY_NAME) || ""
        getScheduleJsonInputElement().value = localStorage.getItem(KEY_SCHEDULES_JSON) || ""
        getLocationJsonInputElement().value = localStorage.getItem(KEY_LOCATIONS_JSON) || ""
    }

    function onChangeName() {
        localStorage.setItem(KEY_NAME, getNameInputElement().value)
    }

    function onChangeScheduleInput() {
        localStorage.setItem(KEY_SCHEDULES_JSON, getScheduleJsonInputElement().value)
    }

    function onChangeLocationInput() {
        localStorage.setItem(KEY_LOCATIONS_JSON, getLocationJsonInputElement().value)
    }

    async function generateAttendanceText() {
        setStatusText("")

        var currentGathering = {}
        var gatheringType = ""
        var locationTemplate = ""

        try {
            currentGathering = determineGatheringNow()
            gatheringType = Object.keys(currentGathering)[0]
            locationTemplate = await getNearbyLocationTemplate()
        } catch (e) {
            if (e instanceof ScheduleJsonParsingError || e instanceof LocationJsonParsingError) {
                setStatusText(e.message)
            } else {
                setStatusText("Something went wrong")
            }
        }

        getAttendanceTextElement().value =
            "Attendance " + (gatheringType || "")
            + "\n" + getAttendanceDate() + " | " + (currentGathering[gatheringType] || getCurrentAttendanceTime())
            + "\n" + getName()
            + (locationTemplate ? "\n" + locationTemplate : "")
    }

    function getName() {
        return getNameInputElement().value || ""
    }

    function getCurrentAttendanceTime() {
        var d = getNowDateTime()
        d = (d.getHours() > 12 ? d.getHours() - 12 : d.getHours()) + ':' + d.getMinutes() + (d.getHours() >= 12 ? "pm" : "am");
        return d
    }

    function getNameInputElement() {
        return document.getElementById("nameInput")
    }

    function getScheduleJsonInputElement() {
        return document.getElementById("scheduleJsonInput")
    }

    function getAttendanceTextElement() {
        return document.getElementById("attendanceText")
    }

    function getLocationJsonInputElement() {
        return document.getElementById("locationJsonInput")
    }

    function getStatusTextElement() {
        return document.getElementById("statusText")
    }

    function getGatheringType(gatheringSchedule) {
        return gatheringTypeMap[gatheringSchedule]
    }

    function determineGatheringNow() {
        var foundGatheringType = ""
        var closestTime = null

        var minMinuteDiff = Number.MAX_SAFE_INTEGER
        var now = getNowDateTime()

        for (const [gatheringType, schedules] of Object.entries(getGatheringSchedules())) {
            for (const [day, times] of Object.entries(schedules)) {
                if (day != now.getDay()) {
                    continue
                }
                for (const gatheringTime of times) {
                    var minuteDiff = Math.abs(toMinuteOfDay(now) - getMinuteOfDay(gatheringTime))

                    if (minuteDiff <= minMinuteDiff) {
                        minMinuteDiff = minuteDiff
                        closestTime = gatheringTime
                        foundGatheringType = gatheringType
                    }
                }
            }
        }

        var gatheringNow = {}
        gatheringNow[foundGatheringType] = closestTime

        return gatheringNow
    }

    async function getNearbyLocationTemplate() {
        var nearbyLocationAssociation = await determineNearbyLocationAssociation()
        if (!nearbyLocationAssociation) {
            return ""
        }

        return nearbyLocationAssociation.template || nearbyLocationAssociation.place || nearbyLocationAssociation.name || ""
    }

    async function determineNearbyLocationAssociation() {
        var locationAssociations = getLocationAssociations()
        if (locationAssociations.length === 0) {
            return null
        }

        var currentCoordinates = await getCurrentCoordinates()
        if (!currentCoordinates) {
            return null
        }

        var closestAssociation = null
        var closestDistanceMeters = Number.MAX_SAFE_INTEGER

        for (const locationAssociation of locationAssociations) {
            if (!locationAssociation || typeof locationAssociation !== "object") {
                continue
            }

            var latitude = getAssociationCoordinate(locationAssociation, ["latitude", "lat"])
            var longitude = getAssociationCoordinate(locationAssociation, ["longitude", "lng", "long"])
            var radiusMeters = parseFloat(locationAssociation.radiusMeters)

            if (isNaN(latitude) || isNaN(longitude)) {
                continue
            }

            if (isNaN(radiusMeters) || radiusMeters <= 0) {
                radiusMeters = DEFAULT_LOCATION_RADIUS_METERS
            }

            var distanceMeters = getDistanceMeters(
                currentCoordinates.latitude,
                currentCoordinates.longitude,
                latitude,
                longitude
            )

            if (distanceMeters <= radiusMeters && distanceMeters < closestDistanceMeters) {
                closestDistanceMeters = distanceMeters
                closestAssociation = locationAssociation
            }
        }

        return closestAssociation
    }

    function getAssociationCoordinate(locationAssociation, possibleKeys) {
        for (const key of possibleKeys) {
            if (locationAssociation[key] !== undefined && locationAssociation[key] !== null && locationAssociation[key] !== "") {
                return parseFloat(locationAssociation[key])
            }
        }

        return NaN
    }

    function getCurrentCoordinates() {
        if (lastKnownCoordinates && (new Date().getTime() - lastKnownCoordinatesAt) < LOCATION_LOOKUP_MAX_AGE_MS) {
            return Promise.resolve(lastKnownCoordinates)
        }

        if (currentLocationLookupPromise) {
            return currentLocationLookupPromise
        }

        currentLocationLookupPromise = new Promise(resolve => {
            if (!navigator.geolocation) {
                currentLocationLookupPromise = null
                resolve(null)
                return
            }

            navigator.geolocation.getCurrentPosition(position => {
                lastKnownCoordinates = {
                    latitude: position.coords.latitude,
                    longitude: position.coords.longitude
                }
                lastKnownCoordinatesAt = new Date().getTime()
                currentLocationLookupPromise = null
                resolve(lastKnownCoordinates)
            }, () => {
                currentLocationLookupPromise = null
                resolve(null)
            }, {
                enableHighAccuracy: true,
                maximumAge: LOCATION_LOOKUP_MAX_AGE_MS,
                timeout: 5000
            })
        })

        return currentLocationLookupPromise
    }

    function getDistanceMeters(startLatitude, startLongitude, endLatitude, endLongitude) {
        var earthRadiusMeters = 6371000
        var latitudeDiff = toRadians(endLatitude - startLatitude)
        var longitudeDiff = toRadians(endLongitude - startLongitude)
        var startLatitudeRadians = toRadians(startLatitude)
        var endLatitudeRadians = toRadians(endLatitude)

        var a =
            Math.sin(latitudeDiff / 2) * Math.sin(latitudeDiff / 2)
            + Math.cos(startLatitudeRadians) * Math.cos(endLatitudeRadians)
            * Math.sin(longitudeDiff / 2) * Math.sin(longitudeDiff / 2)

        var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a))
        return earthRadiusMeters * c
    }

    function toRadians(value) {
        return value * (Math.PI / 180)
    }

    function getNowDateTime() {
        var now = new Date()
        return now
    }

    function getAttendanceDate() {
        var now = getNowDateTime()
        var months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"]
        var date = months[now.getMonth()] + " " + now.getDate() + ", " + now.getFullYear()

        return date
    }

    function toMinuteOfDay(dateTime) {
        var minuteOfDay = dateTime.getHours() * 60 + dateTime.getMinutes()
        return minuteOfDay
    }

    function getMinuteOfDay(timeStr) {
        var hours = getHourOfDay(timeStr)
        var mins = parseInt(timeStr.substr(timeStr.length - 4, timeStr.length - 2))

        return hours * 60 + mins
    }

    function getHourOfDay(timeStr) {
        var hourPart = parseInt(timeStr.split(':')[0])
        var amPm = timeStr.substr(timeStr.length - 2, timeStr.length).toLowerCase()

        if (amPm == 'am' && hourPart == 12) {
            hourPart = 0
        } else if (amPm == "pm" && hourPart < 12) {
            hourPart += 12
        }

        return hourPart
    }

    function clearStatusText() {
        setStatusText("")
    }

    function clearAttendanceText() {
        getAttendanceTextElement().value = ""
    }

    function copyTextToClipboard() {
        navigator.clipboard.writeText(getAttendanceTextElement().value);
        setStatusText("Copied to clipboard".toUpperCase())
    }

    function setStatusText(statusText) {
        getStatusTextElement().innerHTML = statusText
    }

    function getSettingsDiv() {
        return document.getElementById("settingsDiv")
    }

    function closeSettingsPanel() {
        getSettingsDiv().style.display = "none"
    }

    function openSettingsPanel() {
        getSettingsDiv().style.display = "block"
        getNameInputElement().focus()
        clearSettingsButtonAnimation()
    }

    function openScheduleJsonInput() {
        document.getElementById("scheduleJsonInput").style.display = "block"
        document.getElementById("openScheduleJsonButton").style.display = "none"
    }

    function openLocationJsonInput() {
        document.getElementById("locationJsonInput").style.display = "block"
        document.getElementById("openLocationJsonButton").style.display = "none"
    }
</script>
